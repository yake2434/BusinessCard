# 網站配置
# 主題名稱，對應至目錄：./theme/xxxx
theme: default

# HTML 語言設定
lang: "zh-TW"

# 插件（目前無特殊數字抓取需求，留空即可）
plugins:

# Google Analytics 追蹤 ID (若未來有申請可填入)
google_analytics_id:

# HTML 標題
title: "橙色的品源"

# 頭像圖片路徑 (請記得將您的專屬 Logo 圖片存成 profile.jpeg 放入 images 資料夾替換)
avatar: "./images/profile.jpeg"

# 名稱區塊文字
name: "橙色的品源"

# 標語區塊文字 (使用 |- 來保留您設計的換行排版)
tagline: |-
  用影像記錄土地信仰，捕捉台灣文化與人文脈動。
  橙色的品源帶你走訪台灣!
  🎥 台灣宗教民俗文化紀錄頻道
  這裡專注於紀錄台灣的宗教信仰、廟會活動、民俗文化與傳統習俗。偶爾也會分享旅遊景點、環島健行、在地美食與生活日常。
  👉 喜歡廟會文化、宗教祭典、台灣民俗、旅遊探索的朋友，歡迎訂閱並開啟小鈴鐺

